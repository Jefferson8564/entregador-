<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Entregador • O Rei da Coxinha 🍗</title>
<meta name="theme-color" content="#0a0a0b">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet"/>
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0b; --surface:#18181c; --border:rgba(255,255,255,0.08);
  --amber:#f59e0b; --orange:#ea580c; --text:#f4f0ea;
  --text2:rgba(244,240,234,0.55); --text3:rgba(244,240,234,0.28);
  --green:#22c55e;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter','Segoe UI',Roboto,sans-serif;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{background:var(--bg);width:100%;height:100%;overflow:hidden;color:var(--text);position:fixed;inset:0;}

#map{position:fixed;inset:0;width:100%;height:100%;z-index:1;background:#1a1a1a;}
.maplibregl-ctrl-attrib{font-size:9px;background:rgba(0,0,0,0.5)!important;color:#888!important;}
.maplibregl-ctrl-attrib a{color:#aaa!important;}
.maplibregl-ctrl-bottom-right,.maplibregl-ctrl-top-right,.maplibregl-ctrl-bottom-left{display:none!important;}

#marcadorEntregador{font-size:32px;filter:drop-shadow(0 3px 6px rgba(0,0,0,0.6));transform-origin:center center;transition:transform 0.15s linear;}

#btnRecenter{position:fixed;right:14px;bottom:max(110px, calc(env(safe-area-inset-bottom) + 110px));z-index:35;width:46px;height:46px;border-radius:50%;background:rgba(10,10,11,0.85);backdrop-filter:blur(8px);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:19px;color:var(--text2);cursor:pointer;}
#btnRecenter.ativo{color:var(--amber);border-color:rgba(245,158,11,0.4);}

#loadingOverlay{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
#loadingOverlay .e{font-size:48px;animation:floatIcon 1.6s ease-in-out infinite;}
#loadingOverlay .l{font-size:13px;font-weight:600;color:var(--text3);}
@keyframes floatIcon{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}

#gpsBadge{position:fixed;top:max(14px, env(safe-area-inset-top));left:14px;z-index:30;background:rgba(10,10,11,0.85);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:30px;padding:8px 14px 8px 10px;display:flex;align-items:center;gap:7px;font-size:11.5px;font-weight:700;color:var(--text2);}
.dot-live{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;animation:pulseDot 1.6s infinite;}
.dot-live.off{background:#ef4444;animation:none;}
@keyframes pulseDot{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.5);}50%{box-shadow:0 0 0 7px rgba(34,197,94,0);}}

#fab{position:fixed;width:62px;height:62px;border-radius:50%;background:linear-gradient(135deg,#f59e0b,#ea580c);box-shadow:0 8px 24px rgba(234,88,12,0.45), 0 0 0 4px rgba(10,10,11,0.6);z-index:40;display:flex;align-items:center;justify-content:center;font-size:26px;cursor:grab;touch-action:none;transition:transform 0.15s;}
#fab:active{cursor:grabbing;transform:scale(0.93);}
#fabBadge{position:absolute;top:-2px;right:-2px;background:#ef4444;color:#fff;font-size:10.5px;font-weight:800;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 5px;border:2px solid var(--bg);}
#fabBadge.oculto{display:none;}

#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:49;opacity:0;pointer-events:none;transition:opacity 0.25s;}
#overlay.aberto{opacity:1;pointer-events:all;}

#painel{position:fixed;left:0;right:0;bottom:0;z-index:50;background:var(--surface);border-top:1px solid var(--border);border-radius:24px 24px 0 0;max-height:75vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform 0.32s cubic-bezier(.2,.9,.3,1);box-shadow:0 -10px 40px rgba(0,0,0,0.5);}
#painel.aberto{transform:translateY(0);}
.painel-handle{width:40px;height:4px;background:var(--border);border-radius:3px;margin:10px auto 4px;}
.painel-header{padding:10px 18px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
.painel-header h2{font-size:15px;font-weight:800;}
.painel-header .count{font-size:11px;color:var(--text3);font-weight:700;margin-top:2px;}
#fecharPainel{background:rgba(255,255,255,0.06);border:none;color:var(--text2);width:30px;height:30px;border-radius:50%;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

.painel-body{overflow-y:auto;padding:12px 16px 28px;-webkit-overflow-scrolling:touch;}
.pedido-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:10px;}
.pedido-card .top{display:flex;justify-content:space-between;align-items:start;margin-bottom:6px;}
.pedido-card .nome{font-weight:800;font-size:14.5px;}
.pedido-card .total{font-weight:900;color:var(--amber);font-size:14.5px;}
.pedido-card .itens{font-size:12px;color:var(--text3);line-height:1.5;white-space:pre-line;max-height:60px;overflow:hidden;}
.pedido-card .status-tag{display:inline-block;margin-top:8px;font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;background:rgba(245,158,11,0.12);color:var(--amber);}

#vazio{text-align:center;color:var(--text3);font-size:13px;padding:50px 20px;}
#vazio .e{font-size:38px;margin-bottom:10px;}
</style>
</head>
<body>

<div id="loadingOverlay"><div class="e">🛵</div><div class="l">localizando você...</div></div>

<div id="map"></div>

<div id="gpsBadge"><div class="dot-live" id="dotGps"></div><span id="gpsTexto">Buscando GPS...</span></div>

<div id="btnRecenter">🧭</div>

<div id="fab">
  🍗
  <div id="fabBadge" class="oculto">0</div>
</div>

<div id="overlay"></div>
<div id="painel">
  <div class="painel-handle"></div>
  <div class="painel-header">
    <div>
      <h2>Pedidos para entrega</h2>
      <div class="count" id="painelCount">carregando...</div>
    </div>
    <button id="fecharPainel">✕</button>
  </div>
  <div class="painel-body" id="listaPedidos"></div>
</div>

<script>
const SUPABASE_URL = "https://vpeyqgijajywgswmezlh.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZwZXlxZ2lqYWp5d2dzd21lemxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyNTM1MDIsImV4cCI6MjA4NjgyOTUwMn0.LA5Cbof7IKWAA7l8YbCuPzANpCy0rX_Dro4l9fcDgoQ";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ===== MAPA FULLSCREEN 3D (estilo Waze) ===== */
let map = null, watchId = null;
let centralizouUmaVez = false;
let seguindoCamera = true; // quando true, câmera acompanha o entregador automaticamente
let bearingAtual = 0;

// Estilo de mapa escuro gratuito (CARTO) — sem precisar de chave de API
const MAP_STYLE = {
  version: 8,
  sources: {
    'carto-dark': {
      type: 'raster',
      tiles: ['https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png','https://b.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png','https://c.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png'],
      tileSize: 256,
      attribution: '© OpenStreetMap © CARTO'
    }
  },
  layers: [{ id:'carto-dark-layer', type:'raster', source:'carto-dark', minzoom:0, maxzoom:20 }]
};

function initMap(lat, lng){
  map = new maplibregl.Map({
    container: 'map',
    style: MAP_STYLE,
    center: [lng, lat],
    zoom: 17.5,
    pitch: 60,          // inclinação da câmera (estilo Waze)
    bearing: 0,
    attributionControl: true,
    dragRotate: true,
    touchPitch: true
  });

  map.on('load', ()=>{
    const el = document.createElement('div');
    el.id = 'marcadorEntregador';
    el.textContent = '🛵';
    window._marker = new maplibregl.Marker({ element: el, anchor:'center' }).setLngLat([lng, lat]).addTo(map);
    document.getElementById('loadingOverlay').style.display = 'none';
  });

  // se o usuário arrastar o mapa manualmente, para de seguir a câmera automaticamente
  map.on('dragstart', ()=>{ seguindoCamera = false; atualizarBtnRecenter(); });
}

function atualizarBtnRecenter(){
  document.getElementById('btnRecenter').classList.toggle('ativo', seguindoCamera);
}

function atualizarPosicao(lat, lng, heading){
  if(!map){ initMap(lat, lng); return; }
  if(window._marker) window._marker.setLngLat([lng, lat]);

  // gira o ícone do entregador conforme a direção do movimento
  if(heading != null && !isNaN(heading)){
    bearingAtual = heading;
    const el = document.getElementById('marcadorEntregador');
    if(el) el.style.transform = `rotate(${heading}deg)`;
  }

  if(!centralizouUmaVez){
    map.jumpTo({ center:[lng, lat], zoom:17.5, pitch:60 });
    centralizouUmaVez = true;
  } else if(seguindoCamera){
    // câmera segue o entregador, levemente deslocada pra deixar a posição mais embaixo na tela
    map.easeTo({
      center: [lng, lat],
      bearing: heading != null && !isNaN(heading) ? heading : map.getBearing(),
      pitch: 60,
      duration: 800,
      easing: t => t
    });
  }
}

document.getElementById('btnRecenter').addEventListener('click', ()=>{
  seguindoCamera = true;
  atualizarBtnRecenter();
  if(map && window._marker){
    const ll = window._marker.getLngLat();
    map.easeTo({ center: ll, zoom:17.5, pitch:60, bearing: bearingAtual, duration: 600 });
  }
});

function iniciarGPS(){
  if(!navigator.geolocation){
    document.getElementById('gpsTexto').textContent = 'GPS não suportado';
    document.getElementById('dotGps').classList.add('off');
    initMap(-23.5505, -46.6333);
    return;
  }
  watchId = navigator.geolocation.watchPosition((pos)=>{
    const { latitude, longitude, accuracy, speed, heading } = pos.coords;
    atualizarPosicao(latitude, longitude, heading);
    document.getElementById('dotGps').classList.remove('off');
    document.getElementById('gpsTexto').textContent = 'GPS ativo • ±' + Math.round(accuracy) + 'm';
    enviarGPS(latitude, longitude, accuracy, speed, heading);
  }, (err)=>{
    document.getElementById('dotGps').classList.add('off');
    document.getElementById('gpsTexto').textContent = 'Sem sinal de GPS';
    if(!map) initMap(-23.5505, -46.6333);
  }, { enableHighAccuracy:true, maximumAge:4000, timeout:15000 });
}

/* ===== ENVIA POSIÇÃO PRO SUPABASE (alimenta o acompanhamento do cliente) ===== */
let _ultimoEnvioGPS = 0;
async function enviarGPS(lat, lon, accuracy, speed, heading){
  const agora = Date.now();
  if(agora - _ultimoEnvioGPS < 4000) return; // limita a 1 envio a cada 4s
  _ultimoEnvioGPS = agora;
  try{
    await sb.from('gps').upsert({
      entregador: 'principal',
      lat, lon,
      accuracy: accuracy || null,
      speed: speed || null,
      heading: heading || null,
      updated_at: new Date().toISOString()
    }, { onConflict: 'entregador' });
  }catch(e){
    console.error('Erro ao enviar GPS:', e);
  }
}

/* ===== BOTÃO FLUTUANTE ARRASTÁVEL ===== */
const fab = document.getElementById('fab');
let dragging = false, moved = false, offsetX = 0, offsetY = 0;

function posicionarInicial(){
  fab.style.right = '18px';
  fab.style.bottom = 'max(24px, env(safe-area-inset-bottom))';
}
posicionarInicial();

function comecarDrag(x, y){
  dragging = true; moved = false;
  _dragStartX = x; _dragStartY = y;
  const rect = fab.getBoundingClientRect();
  offsetX = x - rect.left;
  offsetY = y - rect.top;
  fab.style.right = 'auto';
  fab.style.bottom = 'auto';
  fab.style.left = rect.left + 'px';
  fab.style.top = rect.top + 'px';
}
let _dragStartX = 0, _dragStartY = 0;
function moverDrag(x, y){
  if(!dragging) return;
  if(!moved){
    const dist = Math.hypot(x - _dragStartX, y - _dragStartY);
    if(dist < 8) return; // ignora tremor do dedo, só conta como arraste de verdade
    moved = true;
  }
  let nx = x - offsetX;
  let ny = y - offsetY;
  const w = fab.offsetWidth, h = fab.offsetHeight;
  nx = Math.max(6, Math.min(window.innerWidth - w - 6, nx));
  ny = Math.max(6, Math.min(window.innerHeight - h - 6, ny));
  fab.style.left = nx + 'px';
  fab.style.top = ny + 'px';
}
function soltarDrag(){
  dragging = false;
  if(!moved) abrirPainel();
}

fab.addEventListener('pointerdown', (e)=>{ fab.setPointerCapture(e.pointerId); comecarDrag(e.clientX, e.clientY); });
fab.addEventListener('pointermove', (e)=>{ moverDrag(e.clientX, e.clientY); });
fab.addEventListener('pointerup', soltarDrag);
fab.addEventListener('pointercancel', soltarDrag);

/* ===== PAINEL DE PEDIDOS ===== */
const painel = document.getElementById('painel');
const overlay = document.getElementById('overlay');

function abrirPainel(){
  painel.classList.add('aberto');
  overlay.classList.add('aberto');
  carregarPedidos();
}
function fecharPainel(){
  painel.classList.remove('aberto');
  overlay.classList.remove('aberto');
}
document.getElementById('fecharPainel').onclick = fecharPainel;
overlay.onclick = fecharPainel;

async function carregarPedidos(){
  const lista = document.getElementById('listaPedidos');
  const count = document.getElementById('painelCount');
  const badge = document.getElementById('fabBadge');
  lista.innerHTML = '<div style="text-align:center;color:var(--text3);font-size:12px;padding:30px;">carregando...</div>';

  try{
    const { data, error } = await sb.from('pedidos')
      .select('*')
      .in('status', ['Em produção', 'Saiu para entrega'])
      .order('created_at', { ascending: true });
    if(error) throw error;

    if(!data || data.length === 0){
      lista.innerHTML = '<div id="vazio"><div class="e">📦</div>Nenhum pedido pronto para entrega no momento.</div>';
      count.textContent = '0 pedidos';
      badge.classList.add('oculto');
      return;
    }

    count.textContent = data.length + (data.length === 1 ? ' pedido' : ' pedidos');
    badge.textContent = data.length;
    badge.classList.remove('oculto');

    lista.innerHTML = '';
    data.forEach(p=>{
      const div = document.createElement('div');
      div.className = 'pedido-card';
      div.innerHTML = `
        <div class="top">
          <div class="nome">${p.customer_name || 'Cliente'}</div>
          <div class="total">R$ ${Number(p.total).toFixed(2)}</div>
        </div>
        <div class="itens">${(p.items||'').slice(0,150)}</div>
        <span class="status-tag">${p.status}</span>
      `;
      lista.appendChild(div);
    });
  }catch(e){
    console.error(e);
    lista.innerHTML = '<div id="vazio"><div class="e">⚠️</div>Erro ao carregar pedidos.</div>';
  }
}

/* ===== INIT ===== */
window.addEventListener('load', ()=>{
  atualizarBtnRecenter();
  iniciarGPS();
});
</script>
</body>
</html>
